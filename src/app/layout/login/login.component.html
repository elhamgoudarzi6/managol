<div class="container">
    <div class="card">
        <div class="row justify-content-center text-center">
            <div class="col-12 mb-3">
                <h1>فرم ورود</h1>
            </div>
        </div>
        <form [formGroup]="form" (ngSubmit)="login()" class="w-100">
            <div class="row justify-content-center">
                <div class="col-12 mt-4">
                    <span class="p-input-icon-right w-100">
                        <i class="pi pi-user"></i>
                        <input class="form-control" formControlName="mobile"  name="mobile" pInputText
                        maxlength="11" minlength="11"
                            placeholder="شماره موبایل" required />
                    </span>
                    <ul class="mt-1 text-right list-inline" *ngFor="let error of errorMessages.mobile">
                        <li class="font-small text-danger font-weight-bold list-inline-item" *ngIf="form.get('mobile').hasError(error.type) &&
                      (form.get('mobile').dirty || form.get('mobile').touched)">
                            {{ error.message }}
                        </li>
                    </ul>
                </div>
                <div class="col-12 mt-4 mb-3 text-center">
                    <button type="submit" class="btn btn-primary btn-block" [disabled]="form.invalid"> ورود
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
